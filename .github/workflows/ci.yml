name: CI + Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate shared assets
        run: npm run generate

      - name: Validate JSON files
        run: npm run validate:json

      - name: Audit theme contrast
        run: npm run color:audit

      - name: Validate site scripts
        run: |
          node --check apps/site/script.js
          node --check apps/playground/script.js

      - name: Check all expected files exist
        run: |
          for f in \
            apps/index.html \
            apps/404.html \
            apps/_redirects \
            apps/robots.txt \
            apps/sitemap.xml \
            apps/site/index.html \
            apps/site/docs.html \
            apps/site/palette.html \
            apps/site/styles.css \
            apps/site/docs.css \
            apps/site/palette.css \
            apps/site/script.js \
            apps/playground/index.html \
            apps/playground/styles.css \
            apps/playground/script.js; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "All site files present."

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate shared assets
        run: npm run generate

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy apps --project-name=peachy-collection --branch=main
