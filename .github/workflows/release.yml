name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate shared assets
        run: npm run generate

      - name: Validate JSON files
        run: npm run validate:json

      - name: Audit theme contrast
        run: npm run color:audit

      - name: Install VS Code packaging tool
        run: npm install -g @vscode/vsce

      - name: Package VS Code extension
        working-directory: packages/vscode-theme
        run: |
          mkdir -p ../../release
          vsce package --out ../../release/peachy-themes.vsix

      - name: Publish VS Code extension
        if: env.VSCE_PAT != ''
        working-directory: packages/vscode-theme
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p "$VSCE_PAT"

      - name: Package theme assets
        run: |
          mkdir -p release
          tar -czf release/peachy-tokens.tar.gz -C packages/tokens .
          tar -czf release/peachy-lazyvim.tar.gz -C packages/lazyvim .
          tar -czf release/peachy-oh-my-posh.tar.gz -C packages/oh-my-posh .
          tar -czf release/peachy-wezterm.tar.gz -C packages/wezterm .
          tar -czf release/peachy-site.tar.gz -C apps/site .
          tar -czf release/peachy-playground.tar.gz -C apps/playground .

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
